<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Document Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <span class="material-symbols-outlined logo-icon">lock_open</span>
                <h1>Password Helper</h1>
            </div>
            <div class="header-actions">
                <button id="profileBtn" class="btn-text">
                    <span class="material-symbols-outlined">account_circle</span>
                    Create Profile
                </button>
            </div>
        </div>
    </header>

    <main class="app-container">
        <section class="search-section">
            <div class="search-bar">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="searchInput" placeholder="Search banks or documents (e.g. Aadhaar, SBI, HDFC)...">
            </div>
        </section>

        <section id="documentGrid" class="document-grid">
            <!-- Documents will be injected here -->
        </section>
    </main>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>User Profile</h2>
                <button class="close-btn material-symbols-outlined">close</button>
            </div>
            <div class="modal-body">
                <p class="modal-subtitle">Details are saved locally in your browser.</p>
                <form id="profileForm">
                    <div class="form-group">
                        <label for="fullName">Full Name (as per documents)</label>
                        <input type="text" id="fullName" placeholder="e.g. Rahul Sharma" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dob">Date of Birth</label>
                            <input type="date" id="dob" required>
                        </div>
                        <div class="form-group">
                            <label for="mobile">Mobile Number</label>
                            <input type="tel" id="mobile" placeholder="Last 5 digits often used" pattern="[0-9]{10}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="pan">PAN Card Number</label>
                            <input type="text" id="pan" placeholder="ABCDE1234F">
                        </div>
                        <div class="form-group">
                            <label for="custId">Customer ID / Account No</label>
                            <input type="text" id="custId" placeholder="For HDFC/PNB/SBI">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="ccLast4">Credit Card (Last 4 digits)</label>
                        <input type="text" id="ccLast4" placeholder="1234">
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" id="downloadProfile" class="btn-outline">
                            <span class="material-symbols-outlined">download</span>
                            Export JSON
                        </button>
                        <button type="submit" class="btn-primary">Save Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Password copied to clipboard!</div>

    <script src="script.js"></script>
</body>
</html>
